name: Rolling release

# Builds ioSender XL in Release config and republishes it as the single
# rolling "latest" GitHub Release on every push to master. No version tags -
# install.ps1 always pulls whatever's tagged "latest".
on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  build-and-publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Embed build commit
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}"
          $path = "ioSender XL\ioSender XL\BuildInfo.cs"
          (Get-Content $path -Raw) -replace '"dev"', "`"$sha`"" | Set-Content $path -NoNewline

      - name: Build Release
        run: msbuild "ioSender XL\ioSender XL.sln" -restore -t:Build -p:Configuration=Release -m -nologo -v:minimal -clp:ErrorsOnly

      - name: Zip build output
        shell: pwsh
        run: |
          $src = "ioSender XL\ioSender XL\bin\Release"
          Compress-Archive -Path "$src\*" -DestinationPath "ioSender.zip" -Force

      - name: Publish rolling "latest" release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: ioSender (latest master build)
          # Kept to a single "build:<branch>@<sha>" marker (same convention as the firmware repo's
          # "drv:<ref>@<sha>") so the app's Check for Updates can parse it without a JSON library.
          body: "build:master@${{ github.sha }}"
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
          prerelease: true
          artifacts: ioSender.zip
          # Default GITHUB_TOKEN can't create releases here - org policy locks
          # default workflow permissions to read-only, and changing it needs
          # org-admin (not available to this repo's maintainer token). Use a
          # PAT stored as a repo secret instead.
          token: ${{ secrets.RELEASE_TOKEN }}
