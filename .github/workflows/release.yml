name: Versioned release

# Builds ioSender XL in Release config and publishes a real versioned GitHub Release
# (2.1, 2.2, ...) on every push to master that adds a new Overview.html changelog
# entry, with notes drawn from the entries new since the previous release. Pushes
# with no new entry (CI/tooling/docs housekeeping - nothing that would produce a
# different .zip worth shipping) are computed but not built or published; no
# version number is consumed. install.ps1 and the in-app Check for Updates both
# pull the actual GitHub "latest release".
#
# After publishing, this workflow also commits Overview.html's TOC "version" stamps
# back to master (tools/cut-release.ps1 fills them in) - guarded with [skip release]
# in that commit's message so it doesn't retrigger itself.
on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  build-and-publish:
    runs-on: windows-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version + changelog delta
        id: relinfo
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: ./tools/cut-release.ps1 -Repo ${{ github.repository }} -Html Overview.html -NotesOut release-notes.md

      - name: Add MSBuild to PATH
        if: ${{ steps.relinfo.outputs.hasChanges == 'true' }}
        uses: microsoft/setup-msbuild@v2

      - name: Embed build commit + version
        if: ${{ steps.relinfo.outputs.hasChanges == 'true' }}
        shell: pwsh
        run: |
          $path = "ioSender XL\ioSender XL\BuildInfo.cs"
          $content = Get-Content $path -Raw
          $content = $content -replace 'CommitSha = "dev"', "CommitSha = `"${{ github.sha }}`""
          $content = $content -replace 'Version = "dev"', 'Version = "${{ steps.relinfo.outputs.version }}"'
          Set-Content $path $content -NoNewline

      - name: Build Release
        if: ${{ steps.relinfo.outputs.hasChanges == 'true' }}
        run: msbuild "ioSender XL\ioSender XL.sln" -restore -t:Build -p:Configuration=Release -m -nologo -v:minimal -clp:ErrorsOnly

      - name: Zip build output
        if: ${{ steps.relinfo.outputs.hasChanges == 'true' }}
        shell: pwsh
        run: |
          $src = "ioSender XL\ioSender XL\bin\Release"
          Compress-Archive -Path "$src\*" -DestinationPath "ioSender.zip" -Force

      - name: Publish release v${{ steps.relinfo.outputs.version }}
        if: ${{ steps.relinfo.outputs.hasChanges == 'true' }}
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.relinfo.outputs.version }}
          name: ioSender ${{ steps.relinfo.outputs.version }}
          bodyFile: ${{ steps.relinfo.outputs.notesFile }}
          makeLatest: true
          prerelease: false
          artifacts: ioSender.zip
          # Default GITHUB_TOKEN can't create releases here - org policy locks
          # default workflow permissions to read-only, and changing it needs
          # org-admin (not available to this repo's maintainer token). Use a
          # PAT stored as a repo secret instead.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Commit changelog version stamps
        if: ${{ steps.relinfo.outputs.hasChanges == 'true' }}
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Overview.html
          git commit -m "chore: stamp v${{ steps.relinfo.outputs.version }} changelog entries [skip release]"
          # actions/checkout persists its own low-privilege GITHUB_TOKEN as a git
          # http.extraheader Authorization header. URL-embedded credentials
          # (x-access-token:TOKEN@github.com) proved unreliable here ("Invalid
          # username or token" even with a token ncipollo/release-action accepted
          # fine moments earlier in the same job). Reusing the same extraheader
          # mechanism with -c ADDS a second header instead of replacing it (git
          # allows multiple values for this key) - GitHub then rejects the push
          # with "Duplicate header: Authorization". Clear the persisted one first,
          # then set ours as the only one.
          git config --local --unset-all http.https://github.com/.extraheader
          $b64 = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("x-access-token:${{ secrets.RELEASE_TOKEN }}"))
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $b64" push origin HEAD:master
